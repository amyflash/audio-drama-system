version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audio-drama-backend
    restart: always
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - DATABASE_URL=sqlite:///./data/audio_drama.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_SECONDS=1800
      - MAX_CONCURRENT_USERS=${MAX_CONCURRENT_USERS:-1000000}
      - SESSION_EXPIRE_SECONDS=1800
      - UPLOAD_MAX_FILE_SIZE=104857600
      - STREAM_TOKEN_EXPIRE_SECONDS=600
      - DEFAULT_ADMIN_PASSWORD=123456
    volumes:
      - ./backend/data:/app/data
      - ./media:/media
    ports:
      - "8000:8000"
    networks:
      - audio-drama-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务 (Nuxt)
  frontend:
    build:
      context: ./nuxt-frontend
      dockerfile: Dockerfile
    container_name: audio-drama-frontend
    restart: always
    environment:
      - NUXT_PUBLIC_API_BASE=http://backend:8000/api
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - audio-drama-network

networks:
  audio-drama-network:
    driver: bridge

volumes:
  media:
