version: '3.8'  # 指定 Compose 版本，兼容 service_healthy

services:  # 必须包含 services 根节点
  backend:
    image: audio-drama-system_backend:latest
    container_name: audio-drama-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///./data/audio_drama.db
      - SECRET_KEY=your-secret-key-change-in-production
      # 其他环境变量
    volumes:
      - /home/gbj/db_data:/app/data
      - /home/gbj/media_data:/media/albums
      - /home/gbj/backup_data:/app/backup
    ports:
      - "8000:8000"
    networks:
      - audio-drama-net
    healthcheck:
      # 改用 wget（更通用），如果后端镜像没有 wget，需先安装（如 apt install wget）
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s       # 每 10 秒检查一次
      timeout: 5s         # 检查超时时间 5 秒
      retries: 5          # 重试 5 次失败则标记为不健康
      start_period: 30s   # 启动后 30 秒再开始检查（给后端启动时间）

  nuxt-frontend:
    image: audio-drama-system_nuxt-frontend:latest
    container_name: audio-drama-nuxt
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy  # 仅后端健康检查通过后启动
        required: true              # 显式指定后端为必需服务（可选，增强可读性）
    environment:
      - API_BASE_URL=http://backend:8000  # 容器内通过服务名访问后端，无需用 localhost
    ports:
      - "5173:80"
    networks:
      - audio-drama-net

# 定义网络（显式声明，避免隐式创建的问题）
networks:
  audio-drama-net:
    driver: bridge