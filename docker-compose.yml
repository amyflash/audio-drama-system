version: '3.8'

services:
  backend:
    build: ./backend
    container_name: audio-drama-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///./data/audio_drama.db
      - SECRET_KEY=your-secret-key-change-in-production
      - JWT_SECRET_KEY=your-jwt-secret-key-change-in-production
      - MAX_CONCURRENT_USERS=10
      - SESSION_EXPIRE_SECONDS=1800
      - UPLOAD_MAX_FILE_SIZE=104857600
      - DEFAULT_ADMIN_PASSWORD=123456
    volumes:
      - /db_data:/app/data
      - /media_data:/media/albums
      - /backup_data:/app/backup
    ports:
      - "8000:8000"
    networks:
      - audio-drama-net

  nuxt-frontend:
    build: ./nuxt-frontend
    container_name: audio-drama-nuxt
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - audio-drama-net

volumes:
  db_data:
  media_data:
  backup_data:

networks:
  audio-drama-net:
    driver: bridge
