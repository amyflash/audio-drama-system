services:  # 必须包含 services 根节点
  backend:
    image: audio-drama-system_backend:latest
    container_name: audio-drama-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///./data/audio_drama.db
      - SECRET_KEY=your-secret-key-change-in-production
      # 其他环境变量
    volumes:
      - /home/gbj/sqlite_data:/data
      - /home/gbj/db_data:/app/data
      - /home/gbj/media_data:/media/albums
      - /home/gbj/backup_data:/app/backup
    ports:
      - "8000:8000"
    networks:
      - audio-drama-net

  nuxt-frontend:
    image: audio-drama-system_nuxt-frontend:latest
    container_name: audio-drama-nuxt
    restart: unless-stopped
    depends_on:
      - backend  # 仅声明依赖关系，不等待健康检查
    environment:
      - API_BASE_URL=http://backend:8000  # 容器内通过服务名访问后端，无需用 localhost
      - ALLOW_ORIGINS=https://gbj.516768.xyz,https://q.1006868.xyz
    ports:
      - "5173:80"
    networks:
      - audio-drama-net

# 定义网络（显式声明，避免隐式创建的问题）
networks:
  audio-drama-net:
    driver: bridge